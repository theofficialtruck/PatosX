# Ruff linter configuration for DuckParadise
# See https://docs.astral.sh/ruff/configuration/

# Default line length (ruff default is 88)
line-length = 120

[lint]
# E402: main.py must patch sys.modules['audioop'] before discord imports (audioop removed in Py3.13)
# This makes all subsequent imports appear "after non-import code" — that's intentional.
per-file-ignores = { "main.py" = ["E402"] }
