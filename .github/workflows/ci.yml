# This workflow executes linting, credential scanning, security analysis, and unit tests
# whenever a pull request is opened against the main branch.
name: CI pipeline

on:
  pull_request:
    branches: [ "main" ]
    
jobs:
  # Job 1: Linting code
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Secret Scanning
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.3
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown

  # Job 3: Security and logic tests
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bandit Security Scan
        run: |
          bandit -r . -v

      - name: Run Pytest Unit Tests
        env:
            PYTHONPATH: .
        run: |
          pytest
