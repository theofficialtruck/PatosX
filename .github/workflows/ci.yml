# This workflow executes linting, credential scanning, security analysis, and unit tests
# whenever a pull request is opened against the main branch.
name: CI pipeline

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  statuses: write

jobs:
  # Job 1: Linting code
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint Code Base
        uses: super-linter/super-linter@v8.6.0
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ruff is the project's sole Python linter/formatter — disable the
          # conflicting tools so they don't produce spurious failures.
          VALIDATE_PYTHON_BLACK: "false"
          VALIDATE_PYTHON_FLAKE8: "false"
          VALIDATE_PYTHON_ISORT: "false"
          VALIDATE_PYTHON_MYPY: "false"
          VALIDATE_PYTHON_PYLINT: "false"
          # Biome is a JS/TS tool — not used in this pure-Python project.
          VALIDATE_BIOME_FORMAT: "false"
          VALIDATE_BIOME_LINT: "false"
          # Checkov scans IaC files; our CI is a simple workflow, not IaC.
          VALIDATE_CHECKOV: "false"
          # JSCPD: super-linter passes --threshold 0 internally, ignoring .jscpd.json;
          # test files naturally have repetitive mock setup so duplication is expected.
          VALIDATE_JSCPD: "false"
          # zizmor requires SHA-pinned action refs and explicit permissions blocks;
          # those add maintenance overhead for a hobbyist bot that changes frequently.
          VALIDATE_GITHUB_ACTIONS_ZIZMOR: "false"
          # Prettier YAML/Markdown formatting is not enforced — ruff handles Python
          # style and the project does not use a Prettier config for prose files.
          VALIDATE_YAML_PRETTIER: "false"
          VALIDATE_YAML: "false"
          VALIDATE_MARKDOWN_PRETTIER: "false"
          # Disable spell checker (cspell)
          VALIDATE_SPELL: "false"
          # Disable Markdown structure linting (not just Prettier)
          VALIDATE_MARKDOWN: "false"
          VALIDATE_MARKDOWN_LINK_CHECK: "false"
          # Disable TOML linting (you don’t use pyproject.toml for Ruff)
          VALIDATE_TOML: "false"
          # Disable XML linting (Super‑Linter runs this even if you have no XML files)
          VALIDATE_XML: "false"
          # Disable Dockerfile linting unless you containerize your bot
          VALIDATE_DOCKERFILE_HADOLINT: "false"
          # Disable Ansible, Terraform, CloudFormation, ARM (IaC tools)
          VALIDATE_TERRAFORM: "false"
          VALIDATE_ANSIBLE: "false"
          VALIDATE_ARM: "false"
          VALIDATE_CLOUDFORMATION: "false"
          # Don't need to validate shell scripts
          VALIDATE_EDITORCONFIG: "false"
          VALIDATE_BASH: "false"


  # Job 2: Secret Scanning
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown

  # Job 3: Security and logic tests
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bandit Security Scan
        run: |
          # Production code — skip B311 (random is fine for game logic, not crypto)
          # and B608 (embed description strings are not SQL queries).
          bandit -r . --exclude ./tests,./.venv,./env -s B311,B608 -v
          # Test code — additionally skip B101 (assert is correct in pytest),
          # B404/B603 (subprocess is used intentionally to run quality tools).
          bandit -r ./tests -s B101,B311,B608,B404,B603 -v

      - name: Run Pytest Unit Tests
        env:
          PYTHONPATH: .
        run: |
          pytest
